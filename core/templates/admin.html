<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pio Duran Water Supply System - Admin Dashboard</title>
    
    <!-- External Dependencies: Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Classic Institutional Dashboard Styles -->
    <style>
        :root {
            --bg-navy: #0f1d3a;          /* Deep Regal Navy */
            --sidebar-bg: #0b1528;       /* Darker Navy for structural separation */
            --main-bg: #f8fafc;          /* Light Slate Content Area */
            --card-bg: #ffffff;          /* Crisp Clean White Containers */
            --primary-text: #1e293b;      /* Dark Slate */
            --secondary-text: #64748b;    /* Muted Slate */
            --accent-gold: #b45309;       /* Heritage Amber/Gold */
            --border-classic: #e2e8f0;     /* Boundary Lines */
            --accent-blue: #1d4ed8;       /* Traditional System Blue */
            --success-green: #15803d;     /* System Success Tone */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background-color: var(--main-bg);
            color: var(--primary-text);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- SIDEBAR STRUCTURE --- */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed;
            height: 100vh;
            z-index: 10;
        }

        .sidebar-brand {
            padding: 30px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-brand i {
            color: var(--accent-gold);
            font-size: 22px;
        }

        .sidebar-brand h2 {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.8px;
            line-height: 1.4;
            color: #ffffff;
        }

        .sidebar-menu {
            list-style: none;
            padding: 24px 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }

        .menu-item a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 24px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .menu-item a:hover, .menu-item.active a {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.03);
        }

        .menu-item.active a {
            border-left-color: var(--accent-gold);
            background-color: rgba(180, 83, 9, 0.08);
            color: #ffffff;
        }

        .menu-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        .menu-logout {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 12px;
            margin-top: auto;
            margin-bottom: 20px;
        }

        .menu-logout a:hover {
            background-color: rgba(220, 38, 38, 0.1);
            color: #ef4444;
        }

        /* --- MAIN VIEWPORT INTERFACE --- */
        .main-content {
            margin-left: 260px;
            width: calc(100% - 260px);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Management Header Bar */
        .top-navbar {
            background-color: var(--card-bg);
            height: 70px;
            border-bottom: 1px solid var(--border-classic);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
        }

        .page-title h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--bg-navy);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-avatar {
            width: 36px;
            height: 36px;
            background-color: #f1f5f9;
            border: 1px solid var(--border-classic);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-navy);
            font-weight: 600;
        }

        .admin-info span {
            font-size: 14px;
            font-weight: 600;
            display: block;
        }

        .admin-info small {
            font-size: 11px;
            color: var(--secondary-text);
            text-transform: uppercase;
        }

        /* Main Workspace Content Grid */
        .workspace {
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            flex-grow: 1;
        }

        /* Key Performance Metric Cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
        }

        .metric-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-classic);
            border-radius: 4px;
            padding: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .metric-details p {
            font-size: 12px;
            font-weight: 600;
            color: var(--secondary-text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .metric-details h3 {
            font-size: 24px;
            font-weight: 700;
            color: var(--bg-navy);
        }

        .metric-icon {
            width: 48px;
            height: 48px;
            background-color: #f8fafc;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--accent-gold);
            border: 1px solid var(--border-classic);
        }

        /* Traditional Records & Tables Area */
        .data-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-classic);
            border-radius: 4px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .section-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-classic);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-header h3 {
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--bg-navy);
            letter-spacing: 0.5px;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        .classic-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        .classic-table th {
            background-color: #f8fafc;
            color: var(--primary-text);
            font-weight: 600;
            padding: 14px 24px;
            border-bottom: 2px solid var(--border-classic);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        .classic-table td {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-classic);
            color: var(--primary-text);
        }

        .classic-table tr:hover td {
            background-color: #f8fafc;
        }

        /* Decorative Status Indicators */
        .badge {
            display: inline-block;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .badge.paid {
            background-color: #dcfce7;
            color: var(--success-green);
        }

        .badge.pending {
            background-color: #fef3c7;
            color: #d97706;
        }

        /* --- REFRESH IN-SYSTEM TERMINAL FOOTER --- */
        .dashboard-footer {
            padding: 20px 40px;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-classic);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--secondary-text);
            margin-top: auto;
        }

        /* Responsive Breakpoints */
        @media (max-width: 992px) {
            .sidebar { width: 70px; }
            .sidebar-brand h2, .menu-item span { display: none; }
            .sidebar-brand { justify-content: center; padding: 20px 0; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); }
            .menu-item a { justify-content: center; padding: 16px 0; border-left-width: 3px; }
        }
    </style>
</head>
<body>

    <!-- --- SIDEBAR NAVIGATION BAR --- -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-hotel-water"></i>
            <h2>Pio Duran<br>Water Supply</h2>
        </div>
        
        <ul class="sidebar-menu">
            <li class="menu-item active">
                <a href="{% url 'admin_dashboard' %}"><i class="fa-solid fa-chart-pie"></i> <span>Overview</span></a>
            </li>
            <li class="menu-item">
                <a href="{% url 'new_applicants' %}"><i class="fa-solid fa-user-plus"></i> <span>New Applicants</span></a>
            </li>
            <li class="menu-item">
                <a href="{% url 'customers' %}"><i class="fa-solid fa-users"></i> <span>Customer</span></a>
            </li>
            <li class="menu-item">
                <a href="{% url 'billing' %}"><i class="fa-solid fa-file-invoice-dollar"></i> <span>Billing</span></a>
            </li>
            <li class="menu-item">
                <a href="{% url 'payments' %}"><i class="fa-solid fa-receipt"></i> <span>Payments</span></a>
            </li>
            <li class="menu-item">
                <a href="{% url 'reports' %}"><i class="fa-solid fa-folder-open"></i> <span>Reports</span></a>
            </li>
            
            <li class="menu-item menu-logout">
                <a href="{% url 'logout-view' %}"><i class="fa-solid fa-power-off"></i> <span>Logout</span></a>
            </li>
        </ul>
    </aside>

    <!-- --- MAIN APPLICATION FRAME WORK --- -->
    <main class="main-content">
        
        {% block content %}
        {% endblock %}
        <!-- System Administration Footer Segment -->
        <footer class="dashboard-footer">
            <p>© 2026 Pio Duran Water Supply System Administration. All Rights Reserved.</p>
            <p>Server Status: Operational & Secure</p>
        </footer>

    </main>

    <!-- Navigation Controller Behavior Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuItems = document.querySelectorAll('.sidebar-menu .menu-item');
            const viewTitle = document.getElementById('current-view-title');

            menuItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    // Prevent page jump for prototype setup links
                    const linkTarget = this.querySelector('a').getAttribute('href');
                    
                    if(linkTarget === '#logout') {
                        if(!confirm("Are you sure you want to terminate your secure administrative session?")) {
                            e.preventDefault();
                            return;
                        }
                        console.log("Terminating management profile session token.");
                        return;
                    }

                    // Remove current focus state from structural sibling tabs
                    menuItems.forEach(i => i.classList.remove('active'));
                    
                    // Activate current target tab focus layout
                    this.classList.add('active');
                    
                    // Update main view title dynamically
                    const tabText = this.querySelector('span').textContent;
                    viewTitle.textContent = tabText === 'Overview' ? 'System Overview' : tabText;
                    
                    console.log(`Loading system segment context for route: ${linkTarget}`);
                });
            });
        });
    </script>
</body>
</html>
